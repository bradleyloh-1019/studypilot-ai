<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPilot AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
  <h1>StudyPilot AI</h1>
  <p class="subtitle">Your Smart Learning Assistant</p>

  <div class="input-card">
    <input id="topic" placeholder="Ask about any subject">
    <select id="mode">
      <option value="explain">Explain Concept</option>
      <option value="quiz">Generate Quiz</option>
      <option value="study">Study Tips</option>
    </select>
    <button onclick="askAI()">Ask AI</button>
  </div>

  <div class="result-card">
    <h3>AI Result</h3>
    <div id="output">AI response will appear here…</div>
  </div>

  <div id="actions" class="actions hidden">
    <button onclick="nextAction('quiz')">New Quiz</button>
    <button onclick="nextAction('explain')">Explain Topic</button>
    <button onclick="nextAction('study')">Study Tips</button>
    <button onclick="nextAction('reveal')">Reveal Answers</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>
</body>
</html>
